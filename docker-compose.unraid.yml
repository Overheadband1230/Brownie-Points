# Unraid stack that pulls the prebuilt image from GitHub Container
# Registry — GitHub Actions builds it on every push to main, the server
# never builds or holds source code. Paste this into a Compose Manager
# stack along with a .env for SECRET_KEY / INVITE_CODE.
#
# Updating after new code lands: Compose Down → Compose Up with
# "pull images" (or `docker compose pull && docker compose up -d`).
# For fully automatic updates, run a Watchtower container.
#
# NOTE: the ghcr.io package must be set to PUBLIC once (GitHub → your
# profile → Packages → brownie-points → Package settings → Change
# visibility), otherwise the pull needs a `docker login ghcr.io`.
services:
  web:
    image: ghcr.io/overheadband1230/brownie-points:latest
    # Custom: br0 (macvlan) — gets its own LAN IP via DHCP; ports: doesn't
    # apply to macvlan. Reach the app at http://<container-ip>:8000.
    networks:
      br0:
    volumes:
      - /mnt/user/appdata/brownie-points/data:/data
    environment:
      - DATABASE_URL=sqlite:////data/brownie.db
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-string}
      - INVITE_CODE=${INVITE_CODE:-brownie-batch}
    restart: unless-stopped

networks:
  br0:
    external: true
